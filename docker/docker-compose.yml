  version: '3.8'

  services:
    backend:
      build:
        context: ..
        dockerfile: docker/Dockerfile.backend
      container_name: member_backend
      restart: unless-stopped
      environment:
        - SECRET_KEY=tsingshu-member-2024-secret-key
        - DEBUG=False
        - ALLOWED_HOSTS=8.147.70.110,localhost,127.0.0.1
        - CORS_ALLOWED_ORIGINS=http://8.147.70.110,https://8.147.70.110
      volumes:
        - db_data:/app/db
        - media_files:/app/media
        - static_files:/app/staticfiles
      ports:
        - "127.0.0.1:8000:8000"
      networks:
        - app_network

  volumes:
    db_data:
      driver: local
    media_files:
      driver: local
    static_files:
      driver: local

  networks:
    app_network:
      driver: bridge
