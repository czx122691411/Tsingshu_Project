  server {
      listen 80;
      server_name 8.147.70.110;

      # 字符集
      charset utf-8;

      # 前端静态文件
      location / {
          root /var/www/member-management/Tsingshu_Project/frontend/dist;
          try_files $uri $uri/ /index.html;
          add_header Cache-Control "no-cache";
      }

      # API 代理到后端
      location /api/ {
          proxy_pass http://127.0.0.1:8000;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_buffering off;
      }

      # Django Admin
      location /admin/ {
          proxy_pass http://127.0.0.1:8000;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }

      # 静态文件
      location /static/ {
          alias /var/www/member-management/Tsingshu_Project/backend/staticfiles/;
      }

      # 媒体文件
      location /media/ {
          alias /var/www/member-management/Tsingshu_Project/backend/media/;
      }
  }
